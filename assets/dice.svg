<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" font-family="ui-sans-serif, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <style>
      .expr { fill:#5eead4; font-size:13.5px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
      .mean { fill:#cbd5e1; font-size:12.5px; }
      .die  { fill:#1e293b; stroke:#2dd4bf; stroke-width:1.6; rx:8; }
      .dnum { fill:#e2e8f0; font-size:18px; font-weight:700; text-anchor:middle; }
      .panel{ fill:#0b1220; stroke:#1e293b; stroke-width:1.5; rx:12; }
      .mono { fill:#7dd3fc; font-size:11.5px; font-family:ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="920" height="400" rx="16" fill="url(#bg3)"/>

  <text x="36" y="46" fill="#f8fafc" font-size="24" font-weight="700">One dice DSL, every 5e roll</text>
  <text x="36" y="70" fill="#94a3b8" font-size="14.5">Parse the notation, roll it, read a typed &amp; frozen result. Deterministic with a seed.</text>

  <!-- Left: notation reference -->
  <g>
    <text class="expr" x="40" y="118">1d20+5</text>      <text class="mean" x="150" y="118">attack / check / save</text>
    <text class="expr" x="40" y="150">4d6kh3</text>      <text class="mean" x="150" y="150">keep highest 3 of 4</text>
    <text class="expr" x="40" y="182">2d6+1d8+3</text>   <text class="mean" x="150" y="182">mixed damage groups</text>
    <text class="expr" x="40" y="214">1d20 · adv</text>  <text class="mean" x="150" y="214">roll twice, take higher</text>
    <text class="expr" x="40" y="246">2d6r1</text>       <text class="mean" x="150" y="246">reroll 1s</text>
    <text class="expr" x="40" y="278">1d6!</text>        <text class="mean" x="150" y="278">exploding dice</text>
    <text class="expr" x="40" y="310">2d8 crit</text>    <text class="mean" x="150" y="310">doubles the dice (4d8)</text>
  </g>

  <!-- divider -->
  <line x1="470" y1="96" x2="470" y2="330" stroke="#1e293b" stroke-width="1.5"/>

  <!-- Right: a rolled example -->
  <g>
    <rect class="panel" x="506" y="100" width="378" height="232"/>
    <text class="mono" x="528" y="132" fill="#5eead4">DiceEngine(seed=42).roll("4d6kh3")</text>

    <!-- four dice; the lowest is dropped (dimmed + struck) -->
    <g opacity="0.4">
      <rect class="die" x="528" y="156" width="44" height="44"/>
      <text class="dnum" x="550" y="184">2</text>
      <line x1="532" y1="200" x2="568" y2="160" stroke="#ef4444" stroke-width="2"/>
    </g>
    <rect class="die" x="588" y="156" width="44" height="44"/>
    <text class="dnum" x="610" y="184">5</text>
    <rect class="die" x="648" y="156" width="44" height="44"/>
    <text class="dnum" x="670" y="184">6</text>
    <rect class="die" x="708" y="156" width="44" height="44"/>
    <text class="dnum" x="730" y="184">4</text>

    <text x="772" y="184" fill="#94a3b8" font-size="12.5">drop lowest</text>

    <text x="528" y="244" fill="#f8fafc" font-size="30" font-weight="700">= 15</text>
    <text x="612" y="244" fill="#94a3b8" font-size="13">kept 5 + 6 + 4</text>

    <text class="mono" x="528" y="284" fill="#7dd3fc">ExpressionResult(total=15,</text>
    <text class="mono" x="528" y="304" fill="#7dd3fc">  individual_rolls=(5, 6, 4), … )</text>
  </g>
</svg>
